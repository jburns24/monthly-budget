# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

dotenv: ['.env']

includes:
  be:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
  fe:
    taskfile: ./frontend/Taskfile.yml
    dir: ./frontend

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install all dependencies and pre-commit hooks
    deps: [be:install, fe:install]
    cmds:
      - pre-commit install

  lint:
    desc: Run all code quality checks
    cmds:
      - pre-commit run --all-files

  test:
    desc: Run all tests
    deps: [be:test, fe:test]

  up:
    desc: Start development environment (Tilt)
    cmds:
      - tilt down 2>/dev/null || true
      - pkill -f "tilt up" 2>/dev/null || true
      - |
        for i in $(seq 1 15); do
          lsof -ti :10350 >/dev/null 2>&1 || break
          sleep 0.5
        done
      - tilt up

  down:
    desc: Stop development environment
    cmds:
      - tilt down
      - pkill -f "tilt up" 2>/dev/null || true

  clean:
    desc: Clean generated files and caches
    deps: [be:clean, fe:clean]

  e2e:
    desc: Run Playwright e2e tests
    dir: e2e
    cmds:
      - npx playwright test

  e2e:ui:
    desc: Run Playwright e2e tests with interactive UI
    dir: e2e
    cmds:
      - npx playwright test --ui

  e2e:headed:
    desc: Run Playwright e2e tests in headed (visible browser) mode
    dir: e2e
    cmds:
      - npx playwright test --headed

  e2e:install:
    desc: Install Playwright dependencies and Chromium browser
    dir: e2e
    cmds:
      - npm install
      - npx playwright install --with-deps chromium
